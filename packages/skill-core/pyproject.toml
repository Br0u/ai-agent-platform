[project]
name = "skill-core"
version = "0.1.0"
description = "Shared safe skill package contracts"
requires-python = ">=3.13"
dependencies = [
    "agno==2.7.2",
]

[build-system]
requires = ["uv_build>=0.11.19,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "mypy>=2.3.0",
    "pytest>=9.1.1",
    "ruff>=0.15.21",
]

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.mypy]
python_version = "3.13"
strict = true

[[tool.mypy.overrides]]
module = ["conftest", "test_archive", "test_diff", "test_manifest", "test_scanner"]
disallow_incomplete_defs = false
disallow_untyped_defs = false
