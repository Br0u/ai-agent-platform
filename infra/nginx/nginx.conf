worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /dev/stdout main;
  error_log /dev/stderr warn;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 10m;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  map $request_method $auth_post_method {
    default "";
    POST $binary_remote_addr;
  }

  map $auth_post_method $auth_post_key {
    default $auth_post_method;
  }

  limit_req_zone $auth_post_key zone=auth_post_per_ip:10m rate=5r/m;

  upstream web_upstream {
    server web:3000;
    keepalive 32;
  }

  server {
    listen 8080;
    server_name _;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location ~ ^/(?:login|register|staff/login|staff/two-factor|staff/re-auth)$ {
      limit_req zone=auth_post_per_ip burst=5 nodelay;
      limit_req_status 429;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://web_upstream;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://web_upstream;
    }
  }
}
