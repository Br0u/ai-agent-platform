name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: ai_agent_test
          POSTGRES_DB: ai_agent_platform_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ai_agent_test -d ai_agent_platform_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ai_agent_test@127.0.0.1:5432/ai_agent_platform_test
      TEST_DATABASE_URL: postgresql://ai_agent_test@127.0.0.1:5432/ai_agent_platform_test
      BETTER_AUTH_URL: http://127.0.0.1:3000
      BETTER_AUTH_TRUSTED_ORIGINS: http://127.0.0.1:3000
      FEATURE_EMAIL_VERIFICATION: "false"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Generate masked authentication fixtures
        shell: bash
        run: |
          for name in BETTER_AUTH_SECRET E2E_CUSTOMER_PASSWORD E2E_STAFF_PASSWORD E2E_ADMIN_PASSWORD; do
            value="$(openssl rand -base64 36 | tr -d '\n')"
            echo "::add-mask::$value"
            echo "$name=$value" >> "$GITHUB_ENV"
          done
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ai-agent-platform/database db:prepare
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm --filter @ai-agent-platform/database db:seed-auth-e2e
        env:
          NODE_ENV: test
      - run: pnpm --filter @ai-agent-platform/web exec playwright install --with-deps chromium
      - run: pnpm --filter @ai-agent-platform/web exec playwright test e2e/auth-smoke.spec.ts
      - run: docker build --target migrator -f apps/web/Dockerfile .
      - run: docker build --target runner -f apps/web/Dockerfile .
      - name: Validate Nginx configuration
        shell: bash
        run: |
          set -euo pipefail
          network="aap-nginx-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          upstream="aap-nginx-web-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker rm -f "$upstream" >/dev/null 2>&1 || true
            docker network rm "$network" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker network create "$network"
          docker run -d --name "$upstream" --network "$network" --network-alias web nginx:1.28.3-alpine3.23
          docker run --rm --network "$network" \
            -e PUBLIC_HOST=127.0.0.1 \
            -v "$PWD/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/infra/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro" \
            nginx:1.28.3-alpine3.23 nginx -t
