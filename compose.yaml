name: ai-agent-platform

services:
  db:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent_owner}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      MIGRATOR_DATABASE_PASSWORD_FILE: /run/secrets/migrator_database_password
      RUNTIME_DATABASE_PASSWORD_FILE: /run/secrets/runtime_database_password
      BACKUP_DATABASE_PASSWORD_FILE: /run/secrets/backup_database_password
    secrets:
      - postgres_password
      - migrator_database_password
      - runtime_database_password
      - backup_database_password
    volumes:
      - db_data:/var/lib/postgresql
      - ./infra/postgres/01-roles.sh:/docker-entrypoint-initdb.d/01-roles.sh:ro
      - ./infra/postgres/01-roles.sql:/opt/postgres/01-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrator
      args:
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
    restart: "no"
    user: root
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command: ["pnpm", "db:prepare"]
    environment:
      SECRET_ENV_SPECS: DATABASE_URL=/run/secrets/migrator_database_url
      SECRET_RUN_AS: node
    secrets:
      - migrator_database_url
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    networks:
      - backend

  agno-bootstrap:
    image: postgres:18.3-alpine3.23
    restart: "no"
    user: root
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent_owner}
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      SECRET_ENV_SPECS: >-
        POSTGRES_PASSWORD=/run/secrets/postgres_password
        AGNO_MIGRATOR_DATABASE_PASSWORD=/run/secrets/agno_migrator_database_password
        AGNO_DATABASE_PASSWORD=/run/secrets/agno_database_password
      SECRET_RUN_AS: postgres
    secrets:
      - postgres_password
      - agno_migrator_database_password
      - agno_database_password
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
      - ./infra/postgres/03-agno-roles.sh:/opt/postgres/03-agno-roles.sh:ro
      - ./infra/postgres/03-agno-roles.sql:/opt/postgres/03-agno-roles.sql:ro
    command: ["/opt/postgres/03-agno-roles.sh"]
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    networks:
      - backend

  agent-migrate:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: "no"
    user: root
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command: ["python", "-m", "agent_service.migrate"]
    environment:
      SECRET_ENV_SPECS: AGNO_MIGRATOR_DATABASE_URL=/run/secrets/agno_migrator_database_url
      SECRET_RUN_AS: agent
    secrets:
      - agno_migrator_database_url
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
    depends_on:
      agno-bootstrap:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    networks:
      - backend

  agent-control-bootstrap:
    image: postgres:18.3-alpine3.23
    restart: "no"
    user: root
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent_owner}
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      SECRET_ENV_SPECS: >-
        POSTGRES_PASSWORD=/run/secrets/postgres_password
        AGENT_CONTROL_MIGRATOR_DATABASE_PASSWORD=/run/secrets/agent_control_migrator_database_password
        AGENT_CONTROL_DATABASE_PASSWORD=/run/secrets/agent_control_database_password
      SECRET_RUN_AS: postgres
    secrets:
      - postgres_password
      - agent_control_migrator_database_password
      - agent_control_database_password
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
      - ./infra/postgres/04-agent-control-roles.sh:/opt/postgres/04-agent-control-roles.sh:ro
      - ./infra/postgres/04-agent-control-roles.sql:/opt/postgres/04-agent-control-roles.sql:ro
    command: ["/opt/postgres/04-agent-control-roles.sh"]
    depends_on:
      db:
        condition: service_healthy
      agno-bootstrap:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    networks:
      - backend

  agent-control-migrate:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: "no"
    user: root
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command: ["python", "-m", "agent_service.model_config_migrate"]
    environment:
      SECRET_ENV_SPECS: AGENT_CONTROL_MIGRATOR_DATABASE_URL=/run/secrets/agent_control_migrator_database_url
      SECRET_RUN_AS: agent
    secrets:
      - agent_control_migrator_database_url
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
    depends_on:
      agent-control-bootstrap:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    networks:
      - backend

  skill-registry-bootstrap:
    image: postgres:18.3-alpine3.23
    restart: "no"
    user: root
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent_owner}
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      SECRET_ENV_SPECS: >-
        POSTGRES_PASSWORD=/run/secrets/postgres_password
        SKILL_REGISTRY_MIGRATOR_DATABASE_PASSWORD=/run/secrets/skill_registry_migrator_database_password
        SKILL_REGISTRY_DATABASE_PASSWORD=/run/secrets/skill_registry_database_password
        SKILL_REGISTRY_RUNTIME_DATABASE_PASSWORD=/run/secrets/skill_registry_runtime_database_password
      SECRET_RUN_AS: postgres
    secrets:
      - postgres_password
      - skill_registry_migrator_database_password
      - skill_registry_database_password
      - skill_registry_runtime_database_password
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
      - ./infra/postgres/05-skill-registry-roles.sh:/opt/postgres/05-skill-registry-roles.sh:ro
      - ./infra/postgres/05-skill-registry-roles.sql:/opt/postgres/05-skill-registry-roles.sql:ro
    command: ["/opt/postgres/05-skill-registry-roles.sh"]
    depends_on:
      db:
        condition: service_healthy
      agno-bootstrap:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    networks:
      - backend

  skill-registry-migrate:
    build:
      context: .
      dockerfile: apps/skill-registry/Dockerfile
    restart: "no"
    user: root
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command: ["python", "-m", "skill_registry.migrate"]
    environment:
      SECRET_ENV_SPECS: SKILL_REGISTRY_MIGRATOR_DATABASE_URL=/run/secrets/skill_registry_migrator_database_url
      SECRET_RUN_AS: skill-registry
    secrets:
      - skill_registry_migrator_database_url
    depends_on:
      skill-registry-bootstrap:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    networks:
      - backend

  skill-registry:
    build:
      context: .
      dockerfile: apps/skill-registry/Dockerfile
    restart: unless-stopped
    user: root
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command:
      [
        "uvicorn",
        "skill_registry.app:app_factory",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "7788",
        "--no-access-log",
      ]
    environment:
      SECRET_ENV_SPECS: >-
        SKILL_REGISTRY_DATABASE_URL=/run/secrets/skill_registry_database_url
        SKILL_REGISTRY_CONTROL_KEY=/run/secrets/skill_registry_control_key
      SECRET_RUN_AS: skill-registry
      SKILL_RUNTIME_IMPORTS_FILE: /etc/aap/skill-runtime-imports.json
    secrets:
      - skill_registry_database_url
      - skill_registry_control_key
    depends_on:
      skill-registry-migrate:
        condition: service_completed_successfully
    expose:
      - "7788"
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/gosu",
          "skill-registry",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7788/internal/health/ready',timeout=3).close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    networks:
      - backend

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    user: root
    entrypoint: ["/opt/aap/run-agent-with-secret-env.sh"]
    command:
      [
        "uvicorn",
        "agent_service.app:app_factory",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "7777",
        "--no-access-log",
      ]
    environment:
      SECRET_ENV_SPECS: >-
        AGNO_DATABASE_URL=/run/secrets/agno_database_url
        AGENT_CONTROL_DATABASE_URL=/run/secrets/agent_control_database_url
        OS_SECURITY_KEY=/run/secrets/os_security_key
        MODEL_CONFIG_ENCRYPTION_KEY=/run/secrets/model_config_encryption_key
        AGENT_CONFIG_CONTROL_KEY=/run/secrets/agent_config_control_key
        MODEL_API_KEY=/run/secrets/model_api_key
      SECRET_RUN_AS: agent
      AGENT_ENABLED: ${AGENT_ENABLED:-false}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-}
      MODEL_ID: ${MODEL_ID:-}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-}
      MODEL_RUN_TIMEOUT_SECONDS: ${MODEL_RUN_TIMEOUT_SECONDS:-50}
      MODEL_ENDPOINTS_FILE: /etc/aap/model-endpoints.json
    secrets:
      - agno_database_url
      - agent_control_database_url
      - os_security_key
      - model_config_encryption_key
      - agent_config_control_key
      - model_api_key
    volumes:
      - ./infra/docker/run-agent-with-secret-env.sh:/opt/aap/run-agent-with-secret-env.sh:ro
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
    depends_on:
      agent-migrate:
        condition: service_completed_successfully
      agent-control-migrate:
        condition: service_completed_successfully
    expose:
      - "7777"
    healthcheck:
      test:
        [
          "CMD",
          "/opt/aap/run-agent-with-secret-env.sh",
          "python",
          "-c",
          "import os,urllib.request; key=os.environ['OS_SECURITY_KEY']; request=urllib.request.Request('http://127.0.0.1:7777/internal/health/ready',headers={'Authorization':'Bearer '+key}); urllib.request.urlopen(request,timeout=3).close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    networks:
      backend:
      model_egress:
        gw_priority: 1

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
    restart: unless-stopped
    user: root
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command: ["node", "server.js"]
    environment:
      SECRET_ENV_SPECS: >-
        DATABASE_URL=/run/secrets/runtime_database_url
        BETTER_AUTH_SECRET=/run/secrets/better_auth_secret
        OS_SECURITY_KEY=/run/secrets/os_security_key
        AGENT_CONFIG_CONTROL_KEY=/run/secrets/agent_config_control_key
        ASSISTANT_SESSION_SECRET=/run/secrets/assistant_session_secret
        ASSISTANT_RATE_LIMIT_SECRET=/run/secrets/assistant_rate_limit_secret
        SKILL_REGISTRY_CONTROL_KEY=/run/secrets/skill_registry_control_key
      SECRET_RUN_AS: node
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL in .env}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:?Set BETTER_AUTH_TRUSTED_ORIGINS in .env}
      FEATURE_EMAIL_VERIFICATION: ${FEATURE_EMAIL_VERIFICATION:-false}
      AGENTOS_INTERNAL_URL: http://agent:7777
      SKILL_REGISTRY_INTERNAL_URL: ${SKILL_REGISTRY_INTERNAL_URL:-http://skill-registry:7788}
      ASSISTANT_PUBLIC_ORIGIN: ${ASSISTANT_PUBLIC_ORIGIN:?Set ASSISTANT_PUBLIC_ORIGIN in .env}
      ASSISTANT_PROVIDER_MODE: ${ASSISTANT_PROVIDER_MODE:-placeholder}
      ASSISTANT_AGENTOS_RUN_TIMEOUT_MS: ${ASSISTANT_AGENTOS_RUN_TIMEOUT_MS:-55000}
      ASSISTANT_AGENTOS_READINESS_TTL_MS: ${ASSISTANT_AGENTOS_READINESS_TTL_MS:-5000}
      ASSISTANT_AGENTOS_PROBE_TIMEOUT_MS: ${ASSISTANT_AGENTOS_PROBE_TIMEOUT_MS:-1500}
      ASSISTANT_AGENTOS_CIRCUIT_FAILURE_THRESHOLD: ${ASSISTANT_AGENTOS_CIRCUIT_FAILURE_THRESHOLD:-3}
      ASSISTANT_AGENTOS_CIRCUIT_RESET_MS: ${ASSISTANT_AGENTOS_CIRCUIT_RESET_MS:-30000}
      TRUST_NGINX_PROXY: "true"
    secrets:
      - runtime_database_url
      - better_auth_secret
      - os_security_key
      - agent_config_control_key
      - assistant_session_secret
      - assistant_rate_limit_secret
      - skill_registry_control_key
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      skill-registry:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/gosu",
          "node",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    networks:
      - frontend
      - backend

  proxy:
    image: nginx:1.28.3-alpine3.23
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?Set PUBLIC_HOST in .env}
      ALLOW_LOCAL_VALIDATION_HOSTS: ${ALLOW_LOCAL_VALIDATION_HOSTS:-false}
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget --header="Host: $${PUBLIC_HOST}" -q -O /dev/null http://127.0.0.1:8080/api/health/live',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=1m
      - /etc/nginx/conf.d:rw,noexec,nosuid,size=1m
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

  backup:
    build:
      context: .
      dockerfile: infra/docker/backup.Dockerfile
    restart: unless-stopped
    command: ["/usr/local/bin/aap-backup"]
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB:-ai_agent_platform}
      PGUSER: ai_agent_backup
      BACKUP_DATABASE_PASSWORD_FILE: /run/secrets/backup_database_password
      BACKUP_ENCRYPTION_KEY_FILE: /run/secrets/backup_encryption_key
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_RUN_ONCE: ${BACKUP_RUN_ONCE:-false}
    secrets:
      - backup_database_password
      - backup_encryption_key
    volumes:
      - backup_data:/backups
    depends_on:
      migrate:
        condition: service_completed_successfully
      agent-migrate:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    cap_drop:
      - ALL
    networks:
      - backend

networks:
  frontend:
  backend:
    internal: true
  model_egress:

volumes:
  db_data:
  backup_data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-.secrets/postgres_password}
  migrator_database_password:
    file: ${MIGRATOR_DATABASE_PASSWORD_FILE:-.secrets/migrator_database_password}
  runtime_database_password:
    file: ${RUNTIME_DATABASE_PASSWORD_FILE:-.secrets/runtime_database_password}
  backup_database_password:
    file: ${BACKUP_DATABASE_PASSWORD_FILE:-.secrets/backup_database_password}
  backup_encryption_key:
    file: ${BACKUP_ENCRYPTION_KEY_FILE:-.secrets/backup_encryption_key}
  agno_migrator_database_password:
    file: ${AGNO_MIGRATOR_DATABASE_PASSWORD_FILE:-.secrets/agno_migrator_database_password}
  agno_database_password:
    file: ${AGNO_DATABASE_PASSWORD_FILE:-.secrets/agno_database_password}
  migrator_database_url:
    file: ${MIGRATOR_DATABASE_URL_FILE:-.secrets/migrator_database_url}
  runtime_database_url:
    file: ${RUNTIME_DATABASE_URL_FILE:-.secrets/runtime_database_url}
  agno_migrator_database_url:
    file: ${AGNO_MIGRATOR_DATABASE_URL_FILE:-.secrets/agno_migrator_database_url}
  agno_database_url:
    file: ${AGNO_DATABASE_URL_FILE:-.secrets/agno_database_url}
  better_auth_secret:
    file: ${BETTER_AUTH_SECRET_FILE:-.secrets/better_auth_secret}
  os_security_key:
    file: ${OS_SECURITY_KEY_FILE:-.secrets/os_security_key}
  assistant_session_secret:
    file: ${ASSISTANT_SESSION_SECRET_FILE:-.secrets/assistant_session_secret}
  assistant_rate_limit_secret:
    file: ${ASSISTANT_RATE_LIMIT_SECRET_FILE:-.secrets/assistant_rate_limit_secret}
  model_api_key:
    file: ${MODEL_API_KEY_FILE:-/dev/null}
  agent_control_migrator_database_password:
    file: ${AGENT_CONTROL_MIGRATOR_DATABASE_PASSWORD_FILE:-.secrets/agent_control_migrator_database_password}
  agent_control_database_password:
    file: ${AGENT_CONTROL_DATABASE_PASSWORD_FILE:-.secrets/agent_control_database_password}
  agent_control_migrator_database_url:
    file: ${AGENT_CONTROL_MIGRATOR_DATABASE_URL_FILE:-.secrets/agent_control_migrator_database_url}
  agent_control_database_url:
    file: ${AGENT_CONTROL_DATABASE_URL_FILE:-.secrets/agent_control_database_url}
  model_config_encryption_key:
    file: ${MODEL_CONFIG_ENCRYPTION_KEY_FILE:-.secrets/model_config_encryption_key}
  agent_config_control_key:
    file: ${AGENT_CONFIG_CONTROL_KEY_FILE:-.secrets/agent_config_control_key}
  skill_registry_migrator_database_password:
    file: ${SKILL_REGISTRY_MIGRATOR_DATABASE_PASSWORD_FILE:-.secrets/skill_registry_migrator_database_password}
  skill_registry_database_password:
