name: ai-agent-platform

services:
  db:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/postgresql
      - ./packages/database/drizzle:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - frontend
      - backend

  proxy:
    image: nginx:1.28.3-alpine3.23
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:8080/api/health/live",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=1m
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

  backup:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    environment:
      PGHOST: db
      PGDATABASE: ${POSTGRES_DB:-ai_agent_platform}
      PGUSER: ${POSTGRES_USER:-ai_agent}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    entrypoint: ["/bin/sh", "/opt/backup/backup.sh"]
    volumes:
      - ./infra/docker/backup.sh:/opt/backup/backup.sh:ro
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

networks:
  frontend:
  backend:
    internal: true

volumes:
  db_data:
  backup_data:
