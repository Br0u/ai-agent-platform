name: ai-agent-platform

services:
  db:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent_owner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      MIGRATOR_DATABASE_PASSWORD: ${MIGRATOR_DATABASE_PASSWORD:?Set MIGRATOR_DATABASE_PASSWORD in .env}
      RUNTIME_DATABASE_PASSWORD: ${RUNTIME_DATABASE_PASSWORD:?Set RUNTIME_DATABASE_PASSWORD in .env}
      BACKUP_DATABASE_PASSWORD: ${BACKUP_DATABASE_PASSWORD:?Set BACKUP_DATABASE_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/postgresql
      - ./infra/postgres/01-roles.sh:/docker-entrypoint-initdb.d/01-roles.sh:ro
      - ./infra/postgres/01-roles.sql:/opt/postgres/01-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: ${MIGRATOR_DATABASE_URL:?Set MIGRATOR_DATABASE_URL in .env}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${RUNTIME_DATABASE_URL:?Set RUNTIME_DATABASE_URL in .env}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL in .env}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:?Set BETTER_AUTH_TRUSTED_ORIGINS in .env}
      FEATURE_EMAIL_VERIFICATION: ${FEATURE_EMAIL_VERIFICATION:-false}
      TRUST_NGINX_PROXY: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - frontend
      - backend

  proxy:
    image: nginx:1.28.3-alpine3.23
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?Set PUBLIC_HOST in .env}
      ALLOW_LOCAL_VALIDATION_HOSTS: ${ALLOW_LOCAL_VALIDATION_HOSTS:-false}
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget --header="Host: $${PUBLIC_HOST}" -q -O /dev/null http://127.0.0.1:8080/api/health/live',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=1m
      - /etc/nginx/conf.d:rw,noexec,nosuid,size=1m
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

  backup:
    build:
      context: .
      dockerfile: infra/docker/backup.Dockerfile
    restart: unless-stopped
    environment:
      BACKUP_DATABASE_URL: ${BACKUP_DATABASE_URL:?Set BACKUP_DATABASE_URL in .env}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - backup_data:/backups
    depends_on:
      migrate:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    cap_drop:
      - ALL
    networks:
      - backend

networks:
  frontend:
  backend:
    internal: true

volumes:
  db_data:
  backup_data:
