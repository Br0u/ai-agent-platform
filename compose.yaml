name: ai-agent-platform

services:
  db:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent_owner}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      MIGRATOR_DATABASE_PASSWORD_FILE: /run/secrets/migrator_database_password
      RUNTIME_DATABASE_PASSWORD_FILE: /run/secrets/runtime_database_password
      BACKUP_DATABASE_PASSWORD_FILE: /run/secrets/backup_database_password
    secrets:
      - postgres_password
      - migrator_database_password
      - runtime_database_password
      - backup_database_password
    volumes:
      - db_data:/var/lib/postgresql
      - ./infra/postgres/01-roles.sh:/docker-entrypoint-initdb.d/01-roles.sh:ro
      - ./infra/postgres/01-roles.sql:/opt/postgres/01-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrator
    restart: "no"
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command: ["pnpm", "db:prepare"]
    environment:
      SECRET_ENV_SPECS: DATABASE_URL=/run/secrets/migrator_database_url
    secrets:
      - migrator_database_url
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  agno-bootstrap:
    image: postgres:18.3-alpine3.23
    restart: "no"
    user: postgres
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent_owner}
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_platform}
      SECRET_ENV_SPECS: >-
        POSTGRES_PASSWORD=/run/secrets/postgres_password
        AGNO_MIGRATOR_DATABASE_PASSWORD=/run/secrets/agno_migrator_database_password
        AGNO_DATABASE_PASSWORD=/run/secrets/agno_database_password
    secrets:
      - postgres_password
      - agno_migrator_database_password
      - agno_database_password
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
      - ./infra/postgres/03-agno-roles.sh:/opt/postgres/03-agno-roles.sh:ro
      - ./infra/postgres/03-agno-roles.sql:/opt/postgres/03-agno-roles.sql:ro
    command: ["/opt/postgres/03-agno-roles.sh"]
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend

  agent-migrate:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: "no"
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command: ["python", "-m", "agent_service.migrate"]
    environment:
      SECRET_ENV_SPECS: AGNO_MIGRATOR_DATABASE_URL=/run/secrets/agno_migrator_database_url
    secrets:
      - agno_migrator_database_url
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
    depends_on:
      agno-bootstrap:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    user: agent
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command:
      [
        "uvicorn",
        "agent_service.app:app_factory",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "7777",
      ]
    environment:
      SECRET_ENV_SPECS: >-
        AGNO_DATABASE_URL=/run/secrets/agno_database_url
        OS_SECURITY_KEY=/run/secrets/os_security_key
    secrets:
      - agno_database_url
      - os_security_key
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
    depends_on:
      agent-migrate:
        condition: service_completed_successfully
    expose:
      - "7777"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,urllib.request; key=pathlib.Path('/run/secrets/os_security_key').read_text().strip(); request=urllib.request.Request('http://127.0.0.1:7777/internal/health/ready',headers={'Authorization':'Bearer '+key}); urllib.request.urlopen(request,timeout=3).close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command: ["node", "server.js"]
    environment:
      SECRET_ENV_SPECS: >-
        DATABASE_URL=/run/secrets/runtime_database_url
        BETTER_AUTH_SECRET=/run/secrets/better_auth_secret
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL in .env}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:?Set BETTER_AUTH_TRUSTED_ORIGINS in .env}
      FEATURE_EMAIL_VERIFICATION: ${FEATURE_EMAIL_VERIFICATION:-false}
      TRUST_NGINX_PROXY: "true"
    secrets:
      - runtime_database_url
      - better_auth_secret
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - frontend
      - backend

  proxy:
    image: nginx:1.28.3-alpine3.23
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?Set PUBLIC_HOST in .env}
      ALLOW_LOCAL_VALIDATION_HOSTS: ${ALLOW_LOCAL_VALIDATION_HOSTS:-false}
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget --header="Host: $${PUBLIC_HOST}" -q -O /dev/null http://127.0.0.1:8080/api/health/live',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=1m
      - /etc/nginx/conf.d:rw,noexec,nosuid,size=1m
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

  backup:
    build:
      context: .
      dockerfile: infra/docker/backup.Dockerfile
    restart: unless-stopped
    entrypoint: ["/opt/aap/run-with-secret-env.sh"]
    command: ["/usr/local/bin/aap-backup"]
    environment:
      SECRET_ENV_SPECS: BACKUP_DATABASE_URL=/run/secrets/backup_database_url
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    secrets:
      - backup_database_url
    volumes:
      - ./infra/docker/run-with-secret-env.sh:/opt/aap/run-with-secret-env.sh:ro
      - backup_data:/backups
    depends_on:
      migrate:
        condition: service_completed_successfully
      agent-migrate:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    cap_drop:
      - ALL
    networks:
      - backend

networks:
  frontend:
  backend:
    internal: true

volumes:
  db_data:
  backup_data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-.secrets/postgres_password}
  migrator_database_password:
    file: ${MIGRATOR_DATABASE_PASSWORD_FILE:-.secrets/migrator_database_password}
  runtime_database_password:
    file: ${RUNTIME_DATABASE_PASSWORD_FILE:-.secrets/runtime_database_password}
  backup_database_password:
    file: ${BACKUP_DATABASE_PASSWORD_FILE:-.secrets/backup_database_password}
  agno_migrator_database_password:
    file: ${AGNO_MIGRATOR_DATABASE_PASSWORD_FILE:-.secrets/agno_migrator_database_password}
  agno_database_password:
    file: ${AGNO_DATABASE_PASSWORD_FILE:-.secrets/agno_database_password}
  migrator_database_url:
    file: ${MIGRATOR_DATABASE_URL_FILE:-.secrets/migrator_database_url}
  runtime_database_url:
    file: ${RUNTIME_DATABASE_URL_FILE:-.secrets/runtime_database_url}
  backup_database_url:
    file: ${BACKUP_DATABASE_URL_FILE:-.secrets/backup_database_url}
  agno_migrator_database_url:
    file: ${AGNO_MIGRATOR_DATABASE_URL_FILE:-.secrets/agno_migrator_database_url}
  agno_database_url:
    file: ${AGNO_DATABASE_URL_FILE:-.secrets/agno_database_url}
  better_auth_secret:
    file: ${BETTER_AUTH_SECRET_FILE:-.secrets/better_auth_secret}
  os_security_key:
    file: ${OS_SECURITY_KEY_FILE:-.secrets/os_security_key}
